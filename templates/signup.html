<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bulk Messenger</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #050505 0%, #1a0505 50%, #2b0808 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            padding: 20px;
        }
        .auth-card {
            background: rgba(20, 20, 24, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-title {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, #ff4d4d, #dc2626);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .logo-title p {
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(15, 15, 20, 0.6);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
            margin-top: 10px;
        }
        .btn-submit:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.6);
        }
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .auth-footer a {
            color: #ef4444;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .auth-footer a:hover {
            color: #ff6b6b;
        }
        .alert-box {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }
        .alert-error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }
        .alert-success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.4);
            color: #86efac;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo-title">
            <h1>Create Account</h1>
            <p>Join Bulk Messenger to start dispatching</p>
        </div>
        
        <div id="alert-box" class="alert-box"></div>

        <form id="signup-form">
            <div class="form-group">
                <label for="username">Choose Username</label>
                <input type="text" id="username" required placeholder="Pick a unique username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="At least 6 characters">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" required placeholder="Repeat password">
            </div>
            <button type="submit" class="btn-submit" id="btn-signup">Register Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('signup-form');
        const alertBox = document.getElementById('alert-box');
        const btnSignup = document.getElementById('btn-signup');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            alertBox.style.display = 'none';
            alertBox.className = 'alert-box';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            if (password !== confirmPassword) {
                alertBox.innerText = 'Passwords do not match.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                return;
            }

            btnSignup.disabled = true;
            btnSignup.innerText = 'Creating Account...';

            try {
                const res = await fetch('/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (data.success) {
                    alertBox.innerText = 'Account created successfully! Redirecting to login...';
                    alertBox.classList.add('alert-success');
                    alertBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                } else {
                    alertBox.innerText = data.message || 'Signup failed.';
                    alertBox.classList.add('alert-error');
                    alertBox.style.display = 'block';
                    btnSignup.disabled = false;
                    btnSignup.innerText = 'Register Account';
                }
            } catch (err) {
                alertBox.innerText = 'Connection error. Please try again.';
                alertBox.classList.add('alert-error');
                alertBox.style.display = 'block';
                btnSignup.disabled = false;
                btnSignup.innerText = 'Register Account';
            }
        });
    </script>
</body>
</html>
